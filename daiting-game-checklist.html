<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>dAIting Game — Bachelor's Scorecard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #222;
    --accent: #ff4f8a;
    --accent2: #a855f7;
    --gold: #fbbf24;
    --text: #f0f0f0;
    --text-dim: #777;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0 0 100px;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 14px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 62px;
    z-index: 49;
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-badge {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--bg);
  }

  .score-item:nth-child(1) .score-badge { background: var(--accent); }
  .score-item:nth-child(2) .score-badge { background: var(--accent2); }
  .score-item:nth-child(3) .score-badge { background: var(--gold); }

  .score-count {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .questions { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .q-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .q-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .q-label {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .q-options {
    display: flex;
    padding: 4px;
  }

  .q-opt {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .q-opt:active { background: rgba(255,255,255,0.03); }

  .q-check {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }

  .q-check svg {
    width: 18px;
    height: 18px;
    stroke: transparent;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: stroke 0.2s;
  }

  .q-opt.selected .q-check {
    transform: scale(1.1);
  }

  .q-opt:nth-child(1).selected .q-check { border-color: var(--accent); background: rgba(255,79,138,0.15); }
  .q-opt:nth-child(1).selected .q-check svg { stroke: var(--accent); }

  .q-opt:nth-child(2).selected .q-check { border-color: var(--accent2); background: rgba(168,85,247,0.15); }
  .q-opt:nth-child(2).selected .q-check svg { stroke: var(--accent2); }

  .q-opt:nth-child(3).selected .q-check { border-color: var(--gold); background: rgba(251,191,36,0.15); }
  .q-opt:nth-child(3).selected .q-check svg { stroke: var(--gold); }

  .q-opt-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
  }

  /* Reset button */
  .reset-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
  }

  .reset-btn {
    background: none;
    border: 1px solid #333;
    color: var(--text-dim);
    font-size: 13px;
    padding: 10px 28px;
    border-radius: 99px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>The dAIting Game</h1>
  <p>Bachelor's Scorecard</p>
</header>

<div class="scoreboard" id="scoreboard">
  <div class="score-item"><div class="score-badge">1</div><div class="score-count" id="score1">0</div></div>
  <div class="score-item"><div class="score-badge">2</div><div class="score-count" id="score2">0</div></div>
  <div class="score-item"><div class="score-badge">3</div><div class="score-count" id="score3">0</div></div>
</div>

<div class="questions" id="questions"></div>

<div class="reset-bar">
  <button class="reset-btn" onclick="resetAll()">Reset all</button>
</div>

<script>
const questions = [
  { num: 1, label: "The First Date Destination" },
  { num: 2, label: "The Desert Island, Upgraded" },
  { num: 3, label: "The Love Language of Machines" },
  { num: 4, label: "The Superpower Swap" },
  { num: 5, label: "The Pickup Line from 2045" },
  { num: 6, label: "The Soil Test" },
  { num: 7, label: "The Red Flag Detector" },
  { num: 8, label: "The Elevator Pitch... For Yourself" },
  { num: 9, label: "The Jealousy Question" },
  { num: 10, label: "The Goodbye Kiss" }
];

const selections = {};
const container = document.getElementById('questions');

const checkSVG = '<svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"/></svg>';

questions.forEach(q => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `
    <div class="q-header">
      <div class="q-num">Q${q.num}</div>
      <div class="q-label">${q.label}</div>
    </div>
    <div class="q-options">
      ${[1,2,3].map(c => `
        <div class="q-opt" data-q="${q.num}" data-c="${c}" onclick="pick(${q.num},${c},this)">
          <div class="q-check">${checkSVG}</div>
          <div class="q-opt-label">#${c}</div>
        </div>
      `).join('')}
    </div>
  `;
  container.appendChild(card);
});

function pick(qNum, contestant, el) {
  const card = el.closest('.q-card');
  const opts = card.querySelectorAll('.q-opt');

  // Toggle: if already selected, deselect
  if (selections[qNum] === contestant) {
    delete selections[qNum];
    opts.forEach(o => o.classList.remove('selected'));
  } else {
    selections[qNum] = contestant;
    opts.forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  updateScores();
}

function updateScores() {
  const counts = { 1: 0, 2: 0, 3: 0 };
  Object.values(selections).forEach(c => counts[c]++);
  document.getElementById('score1').textContent = counts[1];
  document.getElementById('score2').textContent = counts[2];
  document.getElementById('score3').textContent = counts[3];
}

function resetAll() {
  Object.keys(selections).forEach(k => delete selections[k]);
  document.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  updateScores();
}
</script>

</body>
</html>
