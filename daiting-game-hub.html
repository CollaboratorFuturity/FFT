<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The dAIting Game — Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #222;
    --accent: #ff4f8a;
    --accent2: #a855f7;
    --gold: #fbbf24;
    --text: #f0f0f0;
    --text-dim: #777;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 20%, rgba(255,79,138,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
    pointer-events: none;
  }
  .logo {
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 16px; position: relative;
  }
  h1 {
    font-size: 38px; font-weight: 800; text-align: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.15; margin-bottom: 8px; position: relative;
  }
  .sub {
    font-size: 14px; color: var(--text-dim); text-align: center;
    margin-bottom: 48px; position: relative;
  }
  .cards {
    display: flex; flex-direction: column; gap: 14px;
    width: 100%; max-width: 380px; position: relative;
  }
  a.card {
    display: flex; align-items: center; gap: 16px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px;
    text-decoration: none; color: var(--text);
    transition: border-color 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  a.card:active { transform: scale(0.98); }
  a.card:nth-child(1) { border-left: 3px solid var(--text); }
  a.card:nth-child(2) { border-left: 3px solid var(--gold); }
  a.card:nth-child(3) { border-left: 3px solid var(--accent); }
  a.card:nth-child(4) { border-left: 3px solid var(--accent2); }

  .card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  a.card:nth-child(1) .card-icon { background: rgba(240,240,240,0.1); }
  a.card:nth-child(2) .card-icon { background: rgba(251,191,36,0.12); }
  a.card:nth-child(3) .card-icon { background: rgba(255,79,138,0.12); }
  a.card:nth-child(4) .card-icon { background: rgba(168,85,247,0.12); }

  .card-text h2 {
    font-size: 16px; font-weight: 700; margin-bottom: 2px;
  }
  a.card:nth-child(2) .card-text h2 { color: var(--gold); }
  a.card:nth-child(3) .card-text h2 { color: var(--accent); }
  a.card:nth-child(4) .card-text h2 { color: var(--accent2); }

  .card-text p {
    font-size: 12px; color: var(--text-dim); line-height: 1.4;
  }
  .card-arrow {
    margin-left: auto; flex-shrink: 0;
  }
  .card-arrow svg {
    width: 18px; height: 18px; stroke: #444;
    fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .footer {
    margin-top: 48px; font-size: 11px; color: #333;
    text-align: center; position: relative; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="logo">Future Faster Today</div>
<h1>The dAIting<br>Game</h1>
<div class="sub">Pick your role. Open your screen.</div>

<div class="cards">

  <a class="card" href="daiting-game.html">
    <div class="card-icon">🎤</div>
    <div class="card-text">
      <h2>Questions</h2>
      <p>Presenter view — big screen</p>
    </div>
    <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
  </a>

  <a class="card" href="daiting-game-checklist.html">
    <div class="card-icon">💛</div>
    <div class="card-text">
      <h2>Bachelor</h2>
      <p>Scorecard — pick your favorites</p>
    </div>
    <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
  </a>

  <a class="card" href="daiting-game-contestant-a.html">
    <div class="card-icon">💗</div>
    <div class="card-text">
      <h2>Contestant A</h2>
      <p>The Charmer — your answer sheet</p>
    </div>
    <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
  </a>

  <a class="card" href="daiting-game-contestant-b.html">
    <div class="card-icon">💜</div>
    <div class="card-text">
      <h2>Contestant B</h2>
      <p>The Thinker — your answer sheet</p>
    </div>
    <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></div>
  </a>

</div>

<div class="footer">FUTURE FASTER TODAY 2026</div>

</body>
</html>
